services:
  - type: web
    name: cypher-audit-api-v3
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: AUDIT_API_TOKEN
        sync: false
      - key: MAX_RUNTIME_MINUTES
        value: "30"
      - key: MAX_TARGETS
        value: "500"
      - key: MAX_WORDLIST_ENTRIES
        value: "50000"
      - key: MAX_ZIP_BYTES
        value: "26214400"
